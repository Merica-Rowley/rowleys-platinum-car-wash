<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Access your Rowley's Platinum Car Wash membership account through FlexWash."
    />
    <title>Account | Rowley's Platinum Car Wash | Washington, Utah</title>

    <!-- Open Graph Tags -->
    <meta
      property="og:title"
      content="Account | Rowley's Platinum Car Wash | Washington, Utah"
    />
    <meta
      property="og:description"
      content="Access and manage your Rowley's Platinum Car Wash membership account, or sign up as a new member."
    />
    <meta
      property="og:image"
      content="https://platinumcarwash.com/public/logo.png"
    />
    <meta
      property="og:url"
      content="https://platinumcarwash.com/account.html"
    />
    <meta property="og:type" content="website" />

    <link rel="stylesheet" href="carwash.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="icon" href="/public/logo.png" type="image/png" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap");
    </style>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "AutoWash",
        "name": "Rowley's Platinum Car Wash",
        "url": "https://platinumcarwash.com",
        "telephone": "435-216-9598",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "471 W Telegraph St",
          "addressLocality": "Washington",
          "addressRegion": "UT",
          "postalCode": "84780",
          "addressCountry": "US"
        },
        "openingHours": ["Mo-Sa 09:00-19:00"],
        "sameAs": [
          "https://facebook.com/platinumcarwashutah/",
          "https://instagram.com/platinumcarwash_ut/",
          "https://yelp.com/biz/rowleys-platinum-car-wash-washington"
        ]
      }
    </script>
  </head>
  <body class="inter-font">
    <div class="header">
      <nav>
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </label>

        <div class="logo">
          <a href="index.html">
            <img src="/public/logo.png" alt="Rowley's Platinum Car Wash Logo" />
          </a>
        </div>

        <div class="nav-links">
          <a href="pricing.html">Pricing</a>
          <a href="account.html" class="active">Account</a>
        </div>
      </nav>
    </div>
    <main>
      <div class="hero">
        <img
          src="/public/red_truck.jpg"
          loading="lazy"
          alt="Red truck at Rowley's Platinum Car Wash in Washington, Utah"
        />
        <h1 class="hero-overlay-one-line">Account</h1>
      </div>

      <div class="account-section">
        <div class="tab-container">
          <input type="radio" name="account-tab" id="tab-existing" checked />
          <input type="radio" name="account-tab" id="tab-new" />

          <div class="tab-labels">
            <label for="tab-existing" class="tab-label">Existing Member</label>
            <label for="tab-new" class="tab-label">New Member</label>
          </div>

          <div class="tab-panels">
            <div class="tab-panel" id="panel-existing">
              <p class="tab-description">
                Already a member? Manage your membership, update payment info,
                or cancel below.
              </p>
              <div style="width: 100%">
                <iframe
                  src="https://app.flexwash.com/member-portal?organizationId=302"
                  style="
                    width: 100%;
                    min-height: 500px;
                    border: none;
                    border-radius: 12px;
                  "
                  frameborder="0"
                >
                </iframe>
              </div>
            </div>

            <div class="tab-panel" id="panel-new">
              <p class="tab-description">
                New to Rowley's Platinum Car Wash? Sign up for a membership
                below to get started.
              </p>
              <div style="width: 100%">
                <iframe
                  src="https://app.flexwash.com/sign-up-portal?organizationId=302&carWashId=323"
                  style="
                    width: 100%;
                    min-height: 500px;
                    border: none;
                    border-radius: 12px;
                  "
                  frameborder="0"
                >
                </iframe>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div class="footer two-columns">
      <div class="logo-footer">
        <img
          src="/public/logo.png"
          alt="Rowley's Platinum Car Wash Logo"
          loading="lazy"
        />
      </div>
      <div class="footer-list">
        <a href="about.html">About</a>
        <a href="faq.html">FAQ</a>
        <a href="tel:435-216-9598">Contact: 435-216-9598</a>
        <address>471 W Telegraph St, Washington, UT 84780</address>
        <div class="social-buttons">
          <a href="https://facebook.com/platinumcarwashutah/" target="_blank">
            <i class="fab fa-facebook"></i>
          </a>
          <a href="https://instagram.com/platinumcarwash_ut/" target="_blank">
            <i class="fab fa-instagram"></i>
          </a>
          <a
            href="https://yelp.com/biz/rowleys-platinum-car-wash-washington"
            target="_blank"
            aria-label="Yelp"
          >
            <i class="fab fa-yelp"></i>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
